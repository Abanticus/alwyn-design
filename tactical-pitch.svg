  <g fill="#7eb8f0">
    <circle cx="1040" cy="380" r="5"/>
    <circle cx="870"  cy="605" r="5"/>
    <circle cx="885"  cy="455" r="5"/>
    <circle cx="885"  cy="305" r="5"/>
    <circle cx="870"  cy="155" r="5"/>
    <circle cx="700"  cy="438" r="5"/>
    <circle cx="715"  cy="322" r="5"/>
