<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="presentation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0f16"/>
      <stop offset="48%" stop-color="#141929"/>
      <stop offset="100%" stop-color="#090a10"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="36%" stop-color="transparent"/>
      <stop offset="76%" stop-color="#0e0f16" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#0e0f16"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- Pitch markings -->
  <g fill="none" stroke="#7eb8f0" stroke-opacity="0.2" stroke-width="2">
    <rect x="80" y="70" width="1040" height="620"/>
