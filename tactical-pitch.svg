    <line x1="1040" y1="380" x2="885" y2="305"/>
    <line x1="1040" y1="380" x2="870" y2="155"/>
    <line x1="870" y1="605" x2="885" y2="455"/>
    <line x1="885" y1="455" x2="885" y2="305"/>
